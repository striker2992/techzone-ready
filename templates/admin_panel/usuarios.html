{% load static %}

<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios | TechZone</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<h1>👥 Usuarios Registrados</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Usuario</th>
    <th>Email</th>
</tr>

{% for usuario in usuarios %}

<tr>
    <td>{{ usuario.id }}</td>
    <td>{{ usuario.username }}</td>
    <td>{{ usuario.email }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="{% url 'panel_admin' %}">
    Volver al Dashboard
</a>

</body>
</html>
